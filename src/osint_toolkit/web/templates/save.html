{% extends "base.html" %}
{% block title %}收录 — 个人情报工具{% endblock %}
{% block content %}
<h1>收录</h1>
<p class="muted">刷到好内容？粘贴 URL 一键收录到知识库。</p>

<form id="save-form" class="card">
  <div class="form-row">
    <label for="save-url">URL</label>
    <input type="url" id="save-url" placeholder="https://..." required>
  </div>
  <div class="checkbox-group">
    <label><input type="checkbox" id="save-comments"> 含评论</label>
    <label><input type="checkbox" id="save-no-ai"> 跳过 AI</label>
  </div>
  <button type="submit" class="btn mt-1">收录</button>
</form>
<div id="save-message" class="mt-1"></div>

<h2>最近收录</h2>
<div id="recent-items"></div>
{% endblock %}
{% block scripts %}
<script>initSave("{{ prefill_url }}");</script>
{% endblock %}
