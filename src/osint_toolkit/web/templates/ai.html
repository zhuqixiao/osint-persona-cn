{% extends "base.html" %}
{% block title %}AI 控制 — 个人情报工具{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>AI 控制</h1>
    <p class="page-desc">硬约束 &gt; 用户 prompt &gt; 软偏好 &gt; Persona 推断。AI 不静默删除采集结果。</p>
  </div>
</div>
<div id="hard-constraints" class="alert alert-warn"></div>

<div class="tabs">
  <span class="tab active" data-panel="panel-directives">导向 (directives)</span>
  <span class="tab" data-panel="panel-prompts">Prompt 模板</span>
</div>

<div id="panel-directives" class="tab-panel active">
  <div class="card">
    <textarea id="directives-editor" rows="20" style="font-family: monospace;"></textarea>
    <button id="btn-save-directives" class="btn mt-1">保存</button>
  </div>
</div>

<div id="panel-prompts" class="tab-panel">
  <div class="card">
    <div class="form-row">
      <label for="prompt-select">模板</label>
      <select id="prompt-select"></select>
    </div>
    <p id="prompt-source" class="muted"></p>
    <textarea id="prompt-editor" rows="15"></textarea>
    <div class="mt-1">
      <button id="btn-save-prompt" class="btn">保存</button>
      <button id="btn-reset-prompt" class="btn btn-secondary">恢复内置</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>initAI();</script>
{% endblock %}
