# OSINT Toolkit 配置示例

ai:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  timeout: 120

cookie_sync:
  browser: edge
  profile: Default
  auto_sync_before_search: true
  domains:
    - bilibili.com
    - zhihu.com
    - baidu.com
    - bing.com
    - v2ex.com
    - juejin.cn
    - sspai.com
    - huxiu.com
    - 36kr.com
    - sogou.com
    - weixin.sogou.com
    - mp.weixin.qq.com

profiles:
  default:
    label: 默认
    summary: 日常话题搜罗：知乎、B站、网页与搜狗微信公众平台，广度与速度均衡。
    sources: [zhihu, bilibili, web, weixin]
  full:
    label: 全量
    summary: 在默认基础上增加 V2EX 与 RSS，信源最全、耗时更长。
    sources: [zhihu, bilibili, web, v2ex, rss, weixin]
  research:
    label: 深度研究
    summary: 偏社区与技术站点，不含搜狗微信公众平台；默认开启画像模拟。
    sources: [zhihu, bilibili, v2ex, web, rss]
    simulate_persona: true
  zhihu_deep:
    label: 知乎深挖
    summary: 仅知乎，适合问答与观点型话题；默认跳过画像模拟。
    sources: [zhihu]
    simulate_persona: false

rules:
  boost_authors: []
  block_patterns: ["万字干货"]

rss_feeds:
  - https://sspai.com/feed

source_packs:
  tech_research: [zhihu, bilibili, v2ex, web, rss]

http:
  timeout: 30
  user_agent: "OSINT-Toolkit/0.1.0"
  proxy: null              # 科学上网代理，如 http://127.0.0.1:7890（可在设置 → 运行参数 → 外文信源 配置）

# bilibili-api-python 折中集成：搜索/评论/账号深采走 SDK，失败回退自研 WBI + SERP
bilibili:
  use_sdk: true
  sdk_client: httpx          # httpx | aiohttp | curl_cffi
  enable_bili_ticket: false
  features:
    search: true
    comments: true
    subtitle: true
    danmaku: true
    ingest_history: true
    ingest_favorites: true
    ingest_followings: true
    ingest_likes: true
    my_comments: true
  comments_fetch_limit: 60
  danmaku_max_lines: 800
  # ai_first（默认）| cc_first（优先人工/CC 字幕）
  subtitle_prefer: ai_first
  search:
    types: [video, article, bili_user]   # 还可加 topic, media_bangumi, media_ft
    order_video: totalrank               # totalrank|click|pubdate|dm|stow|scores
    order_article: totalrank
    order_user: fans                      # fans|level
    time_start: null                      # YYYY-MM-DD，与 time_end 搭配
    time_end: null
    video_zone_tid: null                  # 视频分区 tid
    time_range_minutes: -1                # 视频时长筛选；-1 表示不限
    serp_fallback: true
    legacy_wbi_fallback: true

# 知乎数据开放平台（官方 API，免 Cookie 站内搜索 / 热榜）
# 申请: https://developer.zhihu.com/docs?key=authorization
zhihu:
  openapi:
    enabled: true
    base_url: https://developer.zhihu.com
    access_secret: ${ZHIHU_ACCESS_SECRET}
    prefer_search: true       # 优先走 openapi，失败再 search_v3 / Playwright / SERP
    merge_search_v3: true     # aggressive 模式下 openapi 结果不足时合并 search_v3
    search_count: 10          # 单次站内搜索上限（官方 max 10）
    hot_list_count: 30
    min_request_interval_sec: 1.0   # 全局限流，避免 Code=30001 second limit exceeded
    rate_limit_retry_max: 4        # 触发限流时的最大重试次数
    rate_limit_retry_base_sec: 1.5
    features:
      search: true
      hot_list: true
      global_search: true     # 全网搜索（含站外），需开放平台密钥

output:
  default_format: markdown
  reports_dir: reports

# 统一同步（Web 完整同步 + 扩展 background sync 共用）
sync:
  prefer_server_api: true
  probe_pages_enabled: true
  scroll_rounds: 4
  scroll_interval_ms: 1500
  initial_wait_ms: 3000
  page_gap_ms: 8000
  max_pages_per_run: 6
  browser_sync_enabled: true
  browser_sync_after_api: true
  browser_sync_mode: auto
  browser_sync_cdp_url: http://127.0.0.1:9222
  browser_sync_headless: true
  aicu_enabled: false
  browser_history_enabled: true
  browser_history_since_days: 90

ingest:
  aicu_enabled: false
  browser_sync_enabled: true
  browser_sync_after_api: true
  browser_sync_mode: auto
  browser_sync_scroll_rounds: 4
  browser_sync_max_pages: 6

# AI 持久导向建议放在用户目录: %USERPROFILE%\.osint\ai_directives.yaml

# 搜索引擎（搜罗 web 源 + 知乎/B站 site: 回退）
search:
  max_concurrent_searches: 2      # 同时运行的搜罗数；超出进入队列
  max_queued_searches: 20          # 排队任务上限，超出返回 429
  sse_max_lifetime_sec: 3600       # 搜罗 SSE 最长保活（含 AI 摘要/报告阶段）
  zhihu_global_collect_sem: 2      # 全进程知乎采集并发（多任务共享）
  discover_aliases: true           # 联网发现关联词（关闭可加速）
  discover_probe_limit: 5
  discover_sources: [bilibili, zhihu, web, v2ex, weixin]
  foreign_expand:
    enabled: auto                  # off | on | auto（设置 → 运行参数 → 外文信源）
    max_foreign_queries: 3
    intl_probe_enabled: auto       # 无代理时跳过国际探针（同上设置页）
    discover_sources_intl: [github, web]
  comment_mine_top: 12
  strict_mode: false
  max_expanded_queries: 5
  max_expanded_queries_strict: 3
  max_expanded_queries_narrow: 4
  skip_alias_discover_narrow: true
  max_collect_tasks: 18
  collect_timeout_sec: 900
  collect_early_stop_items: 45
  min_summarize_relevance: 0.25
  ai_relevance_refine: true           # 去重后 AI 辅助精炼边界条目相关度
  ai_relevance_refine_top: 36
  ai_relevance_borderline_low: 0.12
  ai_relevance_borderline_high: 0.58
  ai_relevance_blend: 0.35            # 最终分 = 规则*(1-blend) + AI*blend
  zhihu_aggressive: true
  zhihu_search_types: [general, content]
  zhihu_search_per_type: 40
  zhihu_search_pages: 5
  zhihu_expand_answers: true
  zhihu_expand_question_top: 15
  zhihu_try_activities: false      # 尝试拉取 activities 动态流（HttpClient 常空；Playwright 补洞页可拦截）
  zhihu_answers_hot_top: 10      # 每题高赞/高票回答条数
  zhihu_answers_recent_top: 4    # 每题额外收录的最新/近期回答
  zhihu_answers_per_question: 14  # 单题回答总上限（hot + recent 去重后）
  source_auto_route:
    mode: gentle              # off=仅排序 | gentle=强相关自动启用/弱相关跳过 | aggressive=更少保护
    strong_threshold: 45      # 达到即自动启用（即使用户未勾选）
    weak_threshold: 12         # 低于此分的垂直/SERP 信源可跳过；知乎/B站/V2EX 等综合性原生信源若用户已勾选则始终参与
    min_active_sources: 3
    max_active_sources: 12
    max_auto_enable: 6        # 单次搜索最多自动新增信源数
    protect_core: true        # 勾选的核心源（zhihu/web）尽量不跳过
    core_sources: [zhihu, web]
    auto_enable_scope: catalog  # catalog=全目录 | user_pool=仅从已勾选里选
    ai_blend: 0.55              # 常规：综合分 = 规则*(1-blend) + AI*blend
    ai_blend_cryptic: 0.78      # 隐晦查询时提高 AI 权重
    cryptic_rule_max: 35        # 规则最高分低于此视为隐晦
    cryptic_strong_threshold: 38  # 隐晦查询时自动启用的综合分门槛（低于 strong_threshold）
    ai_auto_enable_min: 55      # AI auto_enable 列表中项的最低 AI 分
    ai_strong_tier_min: 65      # AI tier=strong 时参与抬分的最低分
  zhihu_comment_limit: 120
  zhihu_comment_mine_top: 12
  zhihu_openapi_deep_fetch_top: 5              # 门控判定后最多加深全文的条数
  zhihu_openapi_deep_fetch_min_relevance: 0.35 # 规则门控：摘要较短且相关度达标时倾向加深
  zhihu_openapi_deep_fetch_max_snippet_len: 400 # 超过此长度视为摘要已较完整（结合 AI/规则）
  zhihu_deep_fetch_ai: true                    # 用 AI 判断 OpenAPI 短摘要是否值得加深（正文/评论）
  zhihu_deep_fetch_skip_relevance: 0.12        # 低于此相关度且无评论信号时可跳过加深以省时
  serp:
    primary: auto          # auto | bing_api | serpapi | searxng | bing_html | duckduckgo_html | baidu_html | sogou_html
    strategy: auto          # auto | fallback | merge_html（无 API Key 时 auto=多 HTML 合并）
    fallbacks: [duckduckgo_html, baidu_html, sogou_html, bing_html]
    merge_min_hits: 5
    cache_ttl_sec: 600     # SERP 结果内存缓存（秒），0=关闭
    html_retry_count: 1    # HTML 引擎遇 429/502 时重试次数
    bing_api_key: ${BING_SEARCH_API_KEY}
    serpapi_key: ${SERPAPI_KEY}
    searxng_base_url: ${SEARXNG_BASE_URL}   # 自建或私有 SearXNG，如 http://127.0.0.1:8080
    duckduckgo_region: cn-zh
    provider_delay_ms: 300
    enabled_providers: []    # 非空时仅启用列出的 provider
    site_searches:
      - github.com
      - bilibili.com
      - zhihu.com
      - ithome.com
      - sspai.com
      - juejin.cn
      - solidot.org
      - 36kr.com
      - huxiu.com
      - caixin.com
      - thepaper.cn
      - ifeng.com
      - smzdm.com
      - chiphell.com
      - gcores.com
      - ngabbs.com
      - weibo.com
      - okjike.com
      - tieba.baidu.com
      - jianshu.com
      - xiaohongshu.com
      - maimai.cn
      - reddit.com
      - news.ycombinator.com
      - music.163.com
      - y.qq.com
      - kugou.com
      - music.migu.cn
      - douban.com
      - xiaoyuzhoufm.com
      - ximalaya.com
    web_fetch_content: true
    web_fetch_top: 5
  weixin:
    resolve_mp_urls: true   # 尝试将搜狗跳转链解析为 mp.weixin.qq.com 永久链
    resolve_top: 3
    fetch_read_count_top: 10  # 对排名前 N 篇拉取阅读量（0=关闭）
    fetch_read_delay_ms: 400  # 拉取间隔，减轻风控
    min_read_count: 500       # 低于此阅读量的文章剔除（0=仅加权不过滤）
    min_snippet_chars: 40     # 搜狗摘要过短则预剔除
    drop_unknown_read_count: false  # true 时剔除无法解析阅读量的文章
    playwright_on_block: true
    serp_fallback: true      # 搜狗失败时用 site:mp.weixin.qq.com

# 话题监视：Web 启动后按 schedule 自动搜罗，仅持久化相对上次的新增 URL
watches:
  - id: example-topic
    query: "示例话题"
    sources: [zhihu, web]
    profile: default
    schedule: "6h"          # 6h / 30m / 每日 HH:MM（本地时区）
    enabled: false
    limit: 10
