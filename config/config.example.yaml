# OSINT Toolkit 配置示例

ai:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  timeout: 120

cookie_sync:
  browser: edge
  profile: Default
  auto_sync_before_search: true
  domains:
    - bilibili.com
    - zhihu.com
    - baidu.com
    - bing.com
    - v2ex.com
    - juejin.cn
    - sspai.com
    - huxiu.com
    - 36kr.com

profiles:
  default:
    sources: [zhihu, bilibili, web]
  research:
    sources: [zhihu, bilibili, v2ex, web, rss]
    simulate_persona: true

rules:
  boost_authors: []
  block_patterns: ["万字干货"]

rss_feeds:
  - https://sspai.com/feed

source_packs:
  tech_research: [zhihu, bilibili, v2ex, web, rss]

http:
  timeout: 30
  user_agent: "OSINT-Toolkit/0.1.0"
  proxy: null

output:
  default_format: markdown
  reports_dir: reports

# AI 持久导向建议放在用户目录: %USERPROFILE%\.osint\ai_directives.yaml
