# OSINT Toolkit 配置示例
# 复制为 config.yaml 后修改:
#   cp config/config.example.yaml config/config.yaml
# 或放到用户目录:
#   %USERPROFILE%\.osint\config.yaml

# DeepSeek AI（OpenAI 兼容 API）
# 推荐用环境变量 DEEPSEEK_API_KEY，不要把真实 Key 写进仓库
ai:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  timeout: 120

# 浏览器 Cookie 同步
cookie_sync:
  browser: edge          # windows 推荐 edge
  profile: Default
  auto_sync_before_search: true
  domains:
    - bilibili.com
    - zhihu.com
    - baidu.com
    - bing.com
    - v2ex.com
    - juejin.cn
    - sspai.com
    - huxiu.com
    - 36kr.com

# HTTP 请求设置
http:
  timeout: 30
  user_agent: "OSINT-Toolkit/0.1.0"
  proxy: null

# 输出设置
output:
  default_format: "markdown"
  reports_dir: "reports"
