# OSINT Toolkit 配置示例

ai:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  timeout: 120

cookie_sync:
  browser: edge
  profile: Default
  auto_sync_before_search: true
  domains:
    - bilibili.com
    - zhihu.com
    - baidu.com
    - bing.com
    - v2ex.com
    - juejin.cn
    - sspai.com
    - huxiu.com
    - 36kr.com
    - sogou.com
    - weixin.sogou.com
    - mp.weixin.qq.com

profiles:
  default:
    sources: [zhihu, bilibili, web, weixin]
  research:
    sources: [zhihu, bilibili, v2ex, web, rss]
    simulate_persona: true
  zhihu_deep:
    sources: [zhihu]
    simulate_persona: false

rules:
  boost_authors: []
  block_patterns: ["万字干货"]

rss_feeds:
  - https://sspai.com/feed

source_packs:
  tech_research: [zhihu, bilibili, v2ex, web, rss]

http:
  timeout: 30
  user_agent: "OSINT-Toolkit/0.1.0"
  proxy: null

# bilibili-api-python 折中集成：搜索/评论/账号深采走 SDK，失败回退自研 WBI + SERP
bilibili:
  use_sdk: true
  sdk_client: httpx          # httpx | aiohttp | curl_cffi
  enable_bili_ticket: false
  features:
    search: true
    comments: true
    subtitle: true
    danmaku: true
    ingest_history: true
    ingest_favorites: true
    ingest_followings: true
    my_comments: true
  comments_fetch_limit: 60
  danmaku_max_lines: 800
  search:
    types: [video, article, bili_user]   # 还可加 topic, media_bangumi, media_ft
    order_video: totalrank               # totalrank|click|pubdate|dm|stow|scores
    order_article: totalrank
    order_user: fans                      # fans|level
    time_start: null                      # YYYY-MM-DD，与 time_end 搭配
    time_end: null
    video_zone_tid: null                  # 视频分区 tid
    time_range_minutes: -1                # 视频时长筛选；-1 表示不限
    serp_fallback: true
    legacy_wbi_fallback: true

output:
  default_format: markdown
  reports_dir: reports

# 统一同步（Web 完整同步 + 扩展 background sync 共用）
sync:
  prefer_server_api: true
  probe_pages_enabled: true
  scroll_rounds: 4
  scroll_interval_ms: 1500
  initial_wait_ms: 3000
  page_gap_ms: 8000
  max_pages_per_run: 6
  browser_sync_enabled: true
  browser_sync_after_api: true
  browser_sync_mode: auto
  browser_sync_cdp_url: http://127.0.0.1:9222
  browser_sync_headless: true
  aicu_enabled: false

ingest:
  aicu_enabled: false
  browser_sync_enabled: true
  browser_sync_after_api: true
  browser_sync_mode: auto
  browser_sync_scroll_rounds: 4
  browser_sync_max_pages: 6

# AI 持久导向建议放在用户目录: %USERPROFILE%\.osint\ai_directives.yaml

# 搜索引擎（搜罗 web 源 + 知乎/B站 site: 回退）
search:
  comment_mine_top: 12
  zhihu_aggressive: true
  zhihu_search_types: [general, content]
  zhihu_search_per_type: 40
  zhihu_search_pages: 5
  zhihu_expand_answers: true
  zhihu_expand_question_top: 15
  zhihu_answers_per_question: 50
  zhihu_comment_limit: 120
  zhihu_comment_mine_top: 12
  serp:
    primary: auto          # auto | bing_api | serpapi | searxng | bing_html | duckduckgo_html | baidu_html | sogou_html
    strategy: fallback     # fallback | merge_html（API 仍优先，HTML 多引擎合并）
    fallbacks: [duckduckgo_html, bing_html, baidu_html, sogou_html]
    merge_min_hits: 5
    bing_api_key: ${BING_SEARCH_API_KEY}
    serpapi_key: ${SERPAPI_KEY}
    searxng_base_url: ${SEARXNG_BASE_URL}   # 自建或私有 SearXNG，如 http://127.0.0.1:8080
    duckduckgo_region: cn-zh
    provider_delay_ms: 300
    enabled_providers: []    # 非空时仅启用列出的 provider
    site_searches: [github.com, bilibili.com, zhihu.com]
    web_fetch_content: true
    web_fetch_top: 5
  weixin:
    resolve_mp_urls: true   # 尝试将搜狗跳转链解析为 mp.weixin.qq.com 永久链
    resolve_top: 3
    playwright_on_block: true
    serp_fallback: true      # 搜狗失败时用 site:mp.weixin.qq.com
