name: OSINT Persona CN - 稳健搜罗流程

# 触发方式：支持手动触发，并允许你每次输入不同的搜索主题
on:
  workflow_dispatch:
    inputs:
      search_topic:
        description: '请输入要搜索的主题'
        required: true
        default: '人工智能 行业政策 2026'

jobs:
  stable-search:
    runs-on: ubuntu-latest
    env:
      # 从 Secrets 读取密钥（如果没有配置，留空即可，配合 --no-ai 使用）
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      OSINT_DATA_DIR: /home/runner/.osint

    steps:
      # 1. 拉取代码
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安装项目核心依赖（不安装可能出问题的扩展）
      - name: 安装项目核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # 4. 创建数据目录
      - name: 准备数据目录
        run: |
          mkdir -p $OSINT_DATA_DIR
          mkdir -p $OSINT_DATA_DIR/runs

      # 5. 环境诊断（确保命令可用）
      - name: 运行环境诊断
        run: |
          osint doctor

      # 6. 【新增】查看 search 命令的帮助文档（方便你以后调试）
      - name: 查看 search 命令帮助
        run: |
          osint search --help

      # 7. 执行最简搜索测试（只使用确认有效的 --no-ai 参数）
      - name: 执行最简搜索
        run: |
          echo "开始搜索主题：${{ github.event.inputs.search_topic }}"
          osint search "${{ github.event.inputs.search_topic }}" --no-ai

      # 8. 上传原始数据与日志
      - name: 上传运行日志与数据
        uses: actions/upload-artifact@v4
        with:
          name: osint-stable-run-${{ github.run_number }}
          path: |
            /home/runner/.osint/runs/
