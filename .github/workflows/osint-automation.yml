name: OSINT Persona CN - 基础搜罗测试

# 触发方式：支持手动触发，方便你调试
on:
  workflow_dispatch:

jobs:
  basic-search:
    runs-on: ubuntu-latest
    # 设置环境变量
    env:
      # 从 Secrets 读取密钥（没有的话留空，不影响基础搜索）
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # 设置数据存储目录
      OSINT_DATA_DIR: /home/runner/.osint

    steps:
      # 1. 拉取代码
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 安装 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安装核心依赖（先不安装 web 和 bilibili 扩展，减少失败可能）
      - name: 安装项目核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # 4. 创建数据目录
      - name: 准备数据目录
        run: |
          mkdir -p $OSINT_DATA_DIR
          mkdir -p $OSINT_DATA_DIR/runs

      # 5. 环境诊断（确认命令可用）
      - name: 运行环境诊断
        run: |
          osint doctor

      # 6. 执行一次最简单的搜索测试（不依赖 AI，限制结果数量）
      - name: 执行基础搜索测试
        run: |
          echo "开始执行基础搜索..."
          osint search "人工智能" --sources web --limit 3 --trace

      # 7. 上传本次运行的日志和原始数据（方便你查看结果）
      - name: 上传运行日志与数据
        uses: actions/upload-artifact@v4
        with:
          name: osint-basic-run-${{ github.run_number }}
          path: |
            /home/runner/.osint/runs/
