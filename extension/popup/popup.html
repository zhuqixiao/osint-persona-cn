<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSINT 个人采集</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>OSINT 个人采集</h1>
  <p class="muted">数据仅写入本机 <code>127.0.0.1:8787</code></p>

  <div id="conn-panel" class="panel">
    <div class="panel-title">连接状态</div>
    <div id="web-status" class="status-line">检测中…</div>
    <div id="queue-status" class="status-line muted"></div>
  </div>

  <div class="panel">
    <div class="panel-title">采集开关</div>
    <label class="row">
      <input type="checkbox" id="enabled" checked>
      <span>启用采集</span>
    </label>
    <label class="row">
      <input type="checkbox" id="passive" checked>
      <span>被动浏览记录</span>
    </label>
    <label class="row">
      <input type="checkbox" id="background-sync" checked>
      <span>定时后台同步（每 4 小时）</span>
    </label>
  </div>

  <div class="panel">
    <div class="panel-title">快捷操作</div>
    <button id="sync-cookies" type="button" class="btn-primary">从浏览器同步 Cookie</button>
    <button id="flush" type="button">上传浏览采集队列</button>
    <button id="sync-now" type="button">服务端拉取 B站/知乎</button>
    <button id="sync-aicu" type="button">浏览器拉取 AICU 发评</button>
  </div>

  <div id="action-result" class="action-result muted"></div>
  <p id="platforms" class="hint"></p>
  <p class="hint">内容页停留 ≥90 秒自动进知识库；右键页面可「收录到 OSINT 知识库」。</p>
  <script src="popup.js"></script>
</body>
</html>
